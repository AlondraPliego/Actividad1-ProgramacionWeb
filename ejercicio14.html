<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arreglos en JS</title>
    <script src="js/ejercicio14.js"></script>
    <link rel="stylesheet" href="css/ejercicio14.css">
</head>
<body>
    <div class="card">
        <h1>Arreglos en JS</h1>
        <form id="calcular">
            <div class="campo">
                <label for="cantidades">Cantidades:</label>
                <input type="text" id="cantidades" name="cantidades" placeholder="Ej: 7,13,21" required>
            </div>
            <p class="error" id="mensajeError"></p>
            <button type="button" onclick="Calcular()">Calcular</button>
            <div class="campo">
                <label for="mayor">Número mayor:</label>
                <input type="number" id="mayor" name="mayor" readonly>
                <label for="menor">Número menor:</label>
                <input type="number" id="menor" name="menor" readonly>
                <label for="promedio">Promedio:</label>
                <input type="number" id="promedio" name="promedio" readonly>
            </div>
        </form>
    </div>
</body>
